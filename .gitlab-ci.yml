stages:
  - security
  - format
  - type_check
  - lint
  - test
  - coverage
  - release

default:
  tags:
    - failure-archive-docker

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  paths:
    - .cache/pip
    - .npm
    - node_modules
    - venv

# --- Security Stage ---

secret_scanning:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . -v --config .gitleaks.toml
  allow_failure: true

dependency_audit_frontend:
  stage: security
  image: node:20-slim
  script:
    - npm audit --audit-level=high

dependency_audit_backend:
  stage: security
  image: python:3.11-slim
  script:
    - pip install pip-audit
    - pip-audit -r backend/requirements.txt

# --- Format Stage ---

ruff_format:
  stage: format
  image: python:3.11-slim
  script:
    - pip install ruff
    - ruff format --check backend/app

frontend_format:
  stage: format
  image: node:20-slim
  script:
    - npm ci
    - npx prettier --check src messages package.json next.config.ts vitest.config.ts postcss.config.mjs eslint.config.mjs

# --- Type Check Stage ---

mypy_check:
  stage: type_check
  image: python:3.11-slim
  script:
    - pip install -r backend/requirements.txt mypy
    - mypy backend/app

frontend_type_check:
  stage: type_check
  image: node:20-slim
  script:
    - npm ci
    - npm run type-check

# --- Lint Stage ---

ruff_lint:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install ruff
    - ruff check backend/app

pylint:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install -r backend/requirements.txt pylint
    - pylint --rcfile=.pylintrc --fail-under=5 backend/app

bandit:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install bandit
    - bandit -c pyproject.toml -r backend/app

frontend_lint:
  stage: lint
  image: node:20-slim
  script:
    - npm ci
    - npm run lint
    - npm run oxlint

# --- Test Stage ---

backend_test:
  stage: test
  image: python:3.11-slim
  script:
    - pip install -r backend/requirements.txt
    - pytest backend/tests

frontend_test:
  stage: test
  image: node:20-slim
  script:
    - npm ci
    - npm test

# --- Coverage Stage ---

backend_coverage:
  stage: coverage
  image: python:3.11-slim
  script:
    - pip install -r backend/requirements.txt
    - pytest --cov=backend/app --cov-report=xml --cov-report=term
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

frontend_coverage:
  stage: coverage
  image: node:20-slim
  script:
    - npm ci
    - npm run test
  artifacts:
    paths:
      - coverage/

# --- Release Stage ---

generate_changelog:
  stage: release
  image:
    name: orhunp/git-cliff:latest
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - git-cliff --tag $CI_COMMIT_TAG -o CHANGELOG.md
  artifacts:
    paths:
      - CHANGELOG.md
